# CI = 로컬 verify와 "동일한" 검사 (백로그: 드리프트 금지).
# 디렉터리 구조가 다르면 working-directory만 맞출 것.
name: verify
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: gradlew verify (로컬과 동일)
        working-directory: backend
        run: ./gradlew verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm run verify (로컬과 동일)
        working-directory: frontend
        run: |
          npm ci
          npm run verify
