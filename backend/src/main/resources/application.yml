spring:
  application:
    name: salary

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/salary}
    username: ${DB_USERNAME:salary}
    password: ${DB_PASSWORD:salary}

  jpa:
    hibernate:
      ddl-auto: validate # 스키마는 Flyway만 만진다
    open-in-view: false

  flyway:
    validate-on-migrate: true # 적용된 마이그레이션 변경 시 기동 거부 (마이그레이션 불변의 본 방어선)

# 인증(AUTH-01). 실제 시크릿은 운영 환경변수로만 주입 — 저장소엔 dev 기본값(로컬 전용).
app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-jwt-secret-please-override-32+bytes!!}
    ttl: ${JWT_TTL:PT1H} # 1시간, 리프레시 토큰은 v1 생략(ADR-03)
  oauth:
    kakao:
      token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:}
    google:
      token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
      user-info-uri: ${GOOGLE_USER_INFO_URI:https://www.googleapis.com/oauth2/v3/userinfo}
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}
  # 공휴일 특일 API(CYCLE-01). 서비스 키는 운영 환경변수로만 주입 — 미주입 시 수집 실패→주말 회피 폴백.
  holiday:
    base-uri: ${HOLIDAY_API_URI:https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo}
    service-key: ${HOLIDAY_API_KEY:}
  # 알림 발송 채널(NOTI-05). log=로그만(기본·SMTP 불요), email=이메일 발송(EmailNotificationSender).
  # email로 켜려면 MailClient(JavaMailSender) 어댑터와 SMTP 설정이 함께 필요하다.
  notification:
    channel: ${NOTIFICATION_CHANNEL:log}
