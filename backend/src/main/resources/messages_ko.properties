# 알림 메일 문구(NOTI-05, 규칙 7 — 문장은 코드가 아닌 번들에). {0}=대상일(locale 포맷).
notification.payday.subject={0} 월급날 — 통장별 이체를 확인하세요
notification.payday.body=오늘은 {0} 월급날이에요.\n\n앱에서 통장별 이체 체크리스트를 확인하고 이번 달 배분을 완료하세요.
# 봉투 지출 시기 알림(NOTI-02). {0}=지출일, {1}=봉투명, {2}=준비 금액(목표액).
notification.envelope_due.subject=[{1}] 지출일이 다가와요 — {0}
notification.envelope_due.body={1} 봉투 지출일({0})이 다가와요.\n\n준비 금액은 {2,number}원이에요. 통장 잔액을 확인하세요.
# 월말 체크인 요청 알림(NOTI-03). {0}=체크인 대상일(다음 지급일 전일, 이번 사이클 마지막 날).
notification.check_in.subject={0} 월말 체크인을 해주세요
notification.check_in.body=내일이 다음 월급날이에요. 오늘({0})은 이번 사이클의 마지막 날입니다.\n\n앱에서 생활비 통장 잔액을 입력해 이번 달 계획 대비 실제를 기록(월말 체크인)하세요.
# 분기 외화 예수금 점검 알림(NOTI-06). {0}=점검일(분기 첫날).
notification.fx_checkup.subject={0} 외화 예수금을 점검하세요
notification.fx_checkup.body=분기 외화 예수금 점검일({0})이에요.\n\n외화 적립식 통장의 예수금 잔액을 확인하고, 누적 환율 오차가 있으면 이체액을 조정하세요.
# 사용자 정의 리마인더(NOTI-06). {0}=알림일, {1}=사용자 메모.
notification.custom.subject=리마인더 — {1}
notification.custom.body={0} 리마인더예요.\n\n{1}
