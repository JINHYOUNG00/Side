# Notification email copy (NOTI-05, rule 7 — sentences live in the bundle, not in code). {0}=target date (locale-formatted).
notification.payday.subject=Payday {0} — review your transfers
notification.payday.body=Today is payday ({0}).\n\nOpen the app to review your per-account transfer checklist and finish this month's allocation.
# Envelope due-date notification (NOTI-02). {0}=due date, {1}=envelope name, {2}=amount to prepare (target).
notification.envelope_due.subject=[{1}] due soon — {0}
notification.envelope_due.body=Your "{1}" envelope is due on {0}.\n\nAmount to prepare: {2,number}. Check your account balance.
