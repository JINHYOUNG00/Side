# Notification email copy (NOTI-05, rule 7 — sentences live in the bundle, not in code). {0}=target date (locale-formatted).
notification.payday.subject=Payday {0} — review your transfers
notification.payday.body=Today is payday ({0}).\n\nOpen the app to review your per-account transfer checklist and finish this month's allocation.
# Envelope due-date notification (NOTI-02). {0}=due date, {1}=envelope name, {2}=amount to prepare (target).
notification.envelope_due.subject=[{1}] due soon — {0}
notification.envelope_due.body=Your "{1}" envelope is due on {0}.\n\nAmount to prepare: {2,number}. Check your account balance.
# Month-end check-in reminder (NOTI-03). {0}=check-in date (the day before the next payday, last day of this cycle).
notification.check_in.subject=Time for your month-end check-in — {0}
notification.check_in.body=Tomorrow is your next payday, so today ({0}) is the last day of this cycle.\n\nOpen the app and enter your living-expense account balance to record this month's plan vs. actual (month-end check-in).
# Quarterly foreign-currency deposit checkup (NOTI-06). {0}=checkup date (first day of the quarter).
notification.fx_checkup.subject=Time to review your foreign-currency deposit — {0}
notification.fx_checkup.body=It''s your quarterly foreign-currency deposit checkup ({0}).\n\nReview the deposit balance of your foreign-currency saving account and adjust your transfer amount if exchange-rate drift has accumulated.
# User-defined reminder (NOTI-06). {0}=reminder date, {1}=user memo.
notification.custom.subject=Reminder — {1}
notification.custom.body=This is your reminder for {0}.\n\n{1}
